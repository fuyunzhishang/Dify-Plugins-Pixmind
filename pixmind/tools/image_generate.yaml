description:
  human:
    en_US: Generate images using Pixmind AI image generation API. Returns the image in markdown format.
    zh_Hans: 使用 Pixmind AI 图片生成 API 生成图片。以 Markdown 格式返回图片。
  llm: Generate images using Pixmind AI. Input a text prompt describing the image you want to generate. Returns the image in markdown format for display in chat.
extra:
  python:
    source: tools/image_generate.py
identity:
  author: pixmind
  name: image_generate
  label:
    en_US: Image Generate
    zh_Hans: 图片生成
parameters:
  - name: prompt
    type: string
    required: true
    label:
      en_US: Prompt
      zh_Hans: 提示词
    human_description:
      en_US: Text description of the image to generate
      zh_Hans: 要生成的图片的文字描述
    llm_description: The text prompt describing the image you want to generate. Be as detailed as possible for better results.
    form: llm
  - name: model
    type: select
    required: false
    default: nano-banana-2-eco
    label:
      en_US: Model
      zh_Hans: 模型
    human_description:
      en_US: The model to use for image generation
      zh_Hans: 用于图片生成的模型
    llm_description: The model to use for image generation. Default is nano-banana-2-eco.
    options:
      - value: z-image
        label:
          en_US: Pixmind
          zh_Hans: Pixmind
      - value: nano-banana-pro
        label:
          en_US: Nano Banana Pro (文生图/图生图)
          zh_Hans: Nano Banana Pro (文生图/图生图)
      - value: nano-banana-pro-lite
        label:
          en_US: Nano Banana Pro Eco (文生图/图生图)
          zh_Hans: Nano Banana Pro Eco (文生图/图生图)
      - value: nano-banana-2
        label:
          en_US: Nano Banana 2 (文生图/图生图)
          zh_Hans: Nano Banana 2 (文生图/图生图)
      - value: nano-banana-2-eco
        label:
          en_US: Nano Banana 2 Eco (文生图/图生图)
          zh_Hans: Nano Banana 2 Eco (文生图/图生图)
      - value: nano-banana
        label:
          en_US: Nano Banana (文生图/图生图)
          zh_Hans: Nano Banana (文生图/图生图)
      - value: seedream-5.0
        label:
          en_US: Seedream 5.0 (文生图/图生图)
          zh_Hans: Seedream 5.0 (文生图/图生图)
      - value: seedream-4.5
        label:
          en_US: Seedream 4.5 (文生图/图生图)
          zh_Hans: Seedream 4.5 (文生图/图生图)
      - value: seedream-4.0
        label:
          en_US: Seedream 4.0 (文生图/图生图)
          zh_Hans: Seedream 4.0 (文生图/图生图)
      - value: gpt-image-4o
        label:
          en_US: GPT Image 4o (文生图/图生图)
          zh_Hans: GPT Image 4o (文生图/图生图)
      - value: gpt-image-1.5
        label:
          en_US: GPT Image 1.5 (文生图/图生图)
          zh_Hans: GPT Image 1.5 (文生图/图生图)
      - value: mj-v7
        label:
          en_US: Midjourney V7 (文生图/图生图)
          zh_Hans: Midjourney V7 (文生图/图生图)
      - value: mj-v6.1
        label:
          en_US: Midjourney V6.1 (文生图/图生图)
          zh_Hans: Midjourney V6.1 (文生图/图生图)
      - value: mj-niji6
        label:
          en_US: Midjourney Niji 6 (文生图/图生图)
          zh_Hans: Midjourney Niji 6 (文生图/图生图)
      - value: imagen-4-standard
        label:
          en_US: Imagen 4 Standard (文生图)
          zh_Hans: Imagen 4 Standard (文生图)
      - value: wan2.6-image
        label:
          en_US: Wan 2.6 Image (文生图/图生图)
          zh_Hans: Wan 2.6 Image (文生图/图生图)
      - value: qwen-image-max
        label:
          en_US: Qwen Image Max (文生图)
          zh_Hans: Qwen Image Max (文生图)
      - value: qwen-image-plus
        label:
          en_US: Qwen Image Plus (文生图)
          zh_Hans: Qwen Image Plus (文生图)
      - value: qwen-image-edit-max
        label:
          en_US: Qwen Image Edit Max (图生图)
          zh_Hans: Qwen Image Edit Max (图生图)
      - value: qwen-image-edit-plus
        label:
          en_US: Qwen Image Edit Plus (图生图)
          zh_Hans: Qwen Image Edit Plus (图生图)
    form: form
  - name: image_url
    type: string
    required: false
    label:
      en_US: Image URL
      zh_Hans: 参考图片 URL
    human_description:
      en_US: Reference image URL for image-to-image generation (required for i2i models)
      zh_Hans: 图生图的参考图片 URL（图生图模型必填）
    llm_description: The URL of a reference image for image-to-image generation. This is required when using models that support image2image (e.g. Nano Banana Pro, Seedream, GPT Image, Midjourney, etc.). Leave empty for text-to-image generation.
    form: llm
  - name: aspect_ratio
    type: select
    required: false
    default: "1:1"
    label:
      en_US: Aspect Ratio
      zh_Hans: 宽高比
    human_description:
      en_US: Aspect ratio of the generated image
      zh_Hans: 生成图片的宽高比
    llm_description: The aspect ratio of the generated image. Options include 1:1, 16:9, 9:16, 4:3, 3:4, 3:2, 2:3. Default is 1:1.
    options:
      - value: "1:1"
        label:
          en_US: "1:1"
          zh_Hans: "1:1"
      - value: "16:9"
        label:
          en_US: "16:9"
          zh_Hans: "16:9"
      - value: "9:16"
        label:
          en_US: "9:16"
          zh_Hans: "9:16"
      - value: "4:3"
        label:
          en_US: "4:3"
          zh_Hans: "4:3"
      - value: "3:4"
        label:
          en_US: "3:4"
          zh_Hans: "3:4"
      - value: "3:2"
        label:
          en_US: "3:2"
          zh_Hans: "3:2"
      - value: "2:3"
        label:
          en_US: "2:3"
          zh_Hans: "2:3"
    form: form
  - name: resolution
    type: select
    required: false
    default: "1K"
    label:
      en_US: Resolution
      zh_Hans: 分辨率
    human_description:
      en_US: Image resolution
      zh_Hans: 图片分辨率
    llm_description: The resolution of the generated image. Options are 1K, 2K, 4K. Not all models support all resolutions. Default is 1K.
    options:
      - value: "1K"
        label:
          en_US: "1K"
          zh_Hans: "1K"
      - value: "2K"
        label:
          en_US: "2K"
          zh_Hans: "2K"
      - value: "3K"
        label:
          en_US: "3K"
          zh_Hans: "3K"
      - value: "4K"
        label:
          en_US: "4K"
          zh_Hans: "4K"
    form: form
  - name: timeout
    type: number
    required: false
    default: 180
    min: 30
    max: 600
    label:
      en_US: Timeout
      zh_Hans: 超时时间
    human_description:
      en_US: Maximum time in seconds to wait for image generation
      zh_Hans: 等待图片生成的最长时间（秒）
    llm_description: Maximum time in seconds to wait for image generation. Default is 60 seconds.
    form: form
  - name: poll_interval
    type: number
    required: false
    default: 2
    min: 1
    max: 10
    label:
      en_US: Poll Interval
      zh_Hans: 轮询间隔
    human_description:
      en_US: Interval in seconds between polling requests
      zh_Hans: 轮询请求之间的间隔（秒）
    llm_description: Interval in seconds between polling requests to check task status. Default is 2 seconds.
    form: form
